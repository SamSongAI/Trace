name: trace-windows-build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/trace-windows/**'
      - '.github/workflows/trace-windows-build.yml'
  pull_request:
    paths:
      - 'clients/trace-windows/**'
      - '.github/workflows/trace-windows-build.yml'

defaults:
  run:
    working-directory: clients/trace-windows

jobs:
  # Cheap static analysis gates. Runs on Linux because neither `cargo fmt` nor
  # clippy on `trace-core` depends on Windows-only crates. Kept separate so
  # formatting/lint failures fail fast without waiting on the full matrix.
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/trace-windows -> target

      - name: cargo fmt --all --check
        run: cargo fmt --all -- --check

      - name: cargo clippy -p trace-core
        run: cargo clippy -p trace-core --all-targets -- -D warnings

  # Cross-platform sanity check for the domain layer. `trace-core` deliberately
  # has no Windows dependencies so it must build and test on Linux too.
  core-tests:
    name: trace-core tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/trace-windows -> target

      - name: Run trace-core tests
        run: cargo test -p trace-core --verbose

  # Full release build requires Windows because `trace-platform` and
  # `trace-app` link against the `windows` crate. We exclude `trace-app` from
  # the explicit build list because it has no runtime yet, but including it
  # still works on Windows.
  windows-release-build:
    name: cargo build --release (windows)
    runs-on: windows-latest
    needs: core-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/trace-windows -> target

      - name: Build trace-core, trace-platform, trace-ui (release)
        run: cargo build --release -p trace-core -p trace-platform -p trace-ui

  # Produce a full MSI artifact from the release binary. Depends on
  # windows-release-build as a smoke gate - if the workspace does not even
  # compile in release mode there is no point spending time on WiX. The job
  # itself still runs its own cargo build because `build-msi.ps1` targets
  # trace-app specifically and x86_64-pc-windows-msvc explicitly, which the
  # upstream job intentionally excludes.
  build-msi:
    name: build MSI (x64)
    runs-on: windows-latest
    needs: windows-release-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable + x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/trace-windows -> target

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX v4 global tool
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX UI extension
        # The UI extension has to be added to the global WiX cache before
        # `wix build -ext WixToolset.UI.wixext` can find it.
        run: wix extension add -g WixToolset.UI.wixext/4.0.5

      - name: Setup Python (for asset regeneration)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: python -m pip install Pillow==10.*

      - name: Build MSI
        shell: pwsh
        # build-msi.ps1 regenerates trace.ico + LICENSE.rtf, runs
        # `cargo build -p trace-app --release --target x86_64-pc-windows-msvc`,
        # then invokes `wix build`. All working-directory handling is internal
        # to the script via $PSScriptRoot.
        run: ./installer/build-msi.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: trace-msi-x64
          path: clients/trace-windows/installer/out/*.msi
          if-no-files-found: error
          retention-days: 14
