<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOTA SYNC Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
</head>
<body class="admin-login-body">
  <main class="login-card">
    <p class="eyebrow">Admin</p>
    <h1>登录 SOTA SYNC 内容后台</h1>
    <p>这个后台只服务一个管理员。先保存草稿和预览，再点击发布生成静态站。</p>
    {% if error %}
      <div class="flash flash-error">{{ error }}</div>
    {% endif %}
    <form class="admin-form" method="post">
      <label>
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <button class="admin-button admin-button-primary" type="submit">Login</button>
    </form>
  </main>
</body>
</html>
