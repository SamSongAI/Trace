limit_req_zone $binary_remote_addr zone=sotasync_admin_login:10m rate=10r/m;

upstream sotasync_admin {
    server 127.0.0.1:4310;
    keepalive 16;
}

server {
    listen 443 ssl http2;
    server_name sotasync.com www.sotasync.com;

    root /var/www/flashnote;
    index index.html;

    # Existing TLS directives stay in the main server block.

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://sotasync_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }

    location = /admin/login {
        limit_req zone=sotasync_admin_login burst=5 nodelay;
        proxy_pass http://sotasync_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }
}
